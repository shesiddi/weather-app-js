<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌤 Weather App</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>

<body class="dark">
    
    <div class="container main-container text-center">
        <div class="theme-toggle">
            <input type="checkbox" id="themeToggleBtn" />
            <label for="themeToggleBtn" class="toggle-label">
                <i class="fa-solid fa-sun icon sun"></i>
                <i class="fa-solid fa-moon icon moon"></i>
                <span class="toggle-ball"></span>
            </label>
        </div>
        <h1 class="mb-3">🌤 Weather App</h1>
        <!-- INPUT CARD -->
        <div class="card p-4 shadow mx-auto mb-3" style="max-width: 400px;">
            <input type="text" id="cityInput" class="form-control mb-3" placeholder="Enter city name" />
            <button class="btn btn-primary mb-3" id="getWeatherBtn">Get Weather</button>
        </div>

        <!-- LOADER -->
        <div id="loader" class="loader d-none"></div>

        <!-- WEATHER CARD (hidden initially) -->
        <div id="weatherCard" class="card p-4 shadow mx-auto d-none" style="max-width: 400px;">
            <div id="result"></div>
        </div>
        <button class="btn mt-3 d-none" id="viewMoreBtn">View More</button>
        <div id="detailsSection" class="d-none mt-4">
            <div class="chart-container">
                <canvas id="weatherChart"></canvas>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</body>

</html>
